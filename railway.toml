# Railway build & start commands for the Express backend

[build]
  builder = "NIXPACKS"
  buildCommand = "cd server && npm install && npm run build && npx prisma generate"

[deploy]
  startCommand = "cd server && npm start"
  healthcheckPath = "/api/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
