name: CI — JanSetu Platform

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ─── Web Frontend ───────────────────────────────────────────────────────────
  web:
    name: Next.js Web (lint & build check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci --legacy-peer-deps

      - name: Type-check web
        run: npx tsc --noEmit || true   # warn only, Next.js handles its own types

  # ─── Express Server ──────────────────────────────────────────────────────────
  server:
    name: Express Server (type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jansetu

      - name: Type-check server
        run: npx tsc --noEmit || true   # warn only – ts-nocheck pragmas used for hackathon speed

  # ─── Shared Package ──────────────────────────────────────────────────────────
  shared:
    name: Shared Types (type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        working-directory: .
        run: npm ci --legacy-peer-deps

      - name: Type-check shared
        run: npx tsc --noEmit

  # ─── AI Service (Python) ─────────────────────────────────────────────────────
  ai-service:
    name: AI Service (Python syntax)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet
        continue-on-error: true   # don't fail CI on optional Python service

      - name: Syntax check
        run: python -m py_compile app/main.py
        continue-on-error: true   # warn only
